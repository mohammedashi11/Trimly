<body class="flex flex-col min-h-screen">
<!-- Top Navigation Bar (Suppressed on Success Screen as per UX guidelines, but showing Brand Identity) -->
<header class="w-full top-0 flex items-center justify-between px-margin-mobile md:px-margin-desktop py-4 w-full max-w-container-max mx-auto">

</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-stack-lg max-w-lg mx-auto w-full">
<!-- Confirmation Icon Section -->

<div class="w-20 h-20 rounded-full border border-primary/20 flex items-center justify-center mb-stack-md bg-primary/5">

</div>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-center text-on-surface">Booking Confirmed</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">Your chair is ready. We've sent the details to your email.</p>
</div>
<!-- Receipt Card -->
<div class="w-full receipt-card border border-outline-variant rounded-xl overflow-hidden shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-150">
<!-- Shop Image Header -->
<div class="h-40 w-full relative">
<div class="absolute inset-0 bg-gradient-to-t from-[#1c1b1b] via-transparent to-transparent z-10"></div>
<img alt="Gentleman's Lounge Interior" class="w-full h-full object-cover grayscale opacity-50 contrast-125" src="https://lh3.googleusercontent.com/aida/AP1WRLt2prrpcJ6QoG9OX_ClWI6LL7rQOKiiZ_Uze94zqBKtmZ_y5o1gH_2fVLC5w-jia8zR59rYaWcQFy5s9mHVYj55d_9PaMdmfc-isZ3Rj5cC4Ldp6x_a5_x2use7DXRz9zkwt0waIQ2dQt0Bq5KGde2EffJMpIKlUk4OpFV1ZMGgmsBVsfxnE7RYVFk2xqcgdrJ30sL39G7MZ066YpFsqhhQ_MlVYnUNZKBdDIV0ypUToRKb1kgiMY56TjE"/>

<h3 class="font-headline-md text-headline-md text-on-surface">The Gentleman's Lounge</h3>
</div>
</div>
<!-- Details Section -->
<div class="p-6 space-y-6">
<!-- Grid Details -->
<div class="grid grid-cols-2 gap-y-gutter">
<div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Barber</span>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Jameson Reed</p>
</div>
<div class="text-right">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Service</span>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Classic Cut &amp; Beard Trim</p>
</div>
<div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Date</span>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Friday, Oct 24</p>
</div>
<div class="text-right">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block mb-1">Time</span>
<p class="font-body-lg text-body-lg text-on-surface font-medium">4:30 PM</p>
</div>

<div class="w-4 h-4 bg-background rounded-full -mt-2 -ml-3"></div>

<p class="font-label-sm text-label-sm">Need to reschedule? Call (555) 012-3456</p>
</footer>
<!-- No BottomNavBar for Confirmation Screen as per UX instructions -->
<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
