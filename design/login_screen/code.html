<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle ambient glow for high-end feel */
        .ambient-glow {
            background: radial-gradient(circle at center, rgba(242, 202, 80, 0.05) 0%, rgba(19, 19, 19, 0) 70%);
        }

        .input-focus-gold:focus {
            border-color: #f2ca50;
            outline: none;
            box-shadow: 0 0 0 1px #f2ca50;
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 ambient-glow pointer-events-none"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-stack-lg animate-fade-in">
<img alt="Trimly Scissors Monogram Logo" class="w-24 h-24 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLv5lkc532FX-OsDcy11r7_9KMtIyesc2zD075KZn_9XB7J1A2m3bnqyn4D3d6oFreibUf2dZxPTWd05CdyiPUrRi7KGZOYP2ukub9hHSkrHNzVI859tzl2MW6WFnxyiM-8KhhTv_JgIAlrWD0tTlT-aeTYVyV7E_RFVPiJbK14xh7Jl5v-VaWBPXWyPU8cr5KhQHNreVInvaToOaB2MlOS_hw5vyFsAscWg-mOe1aW1lr9gBcbkaB5c5w"/>
</div>
<!-- Headline -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background mb-2">
                Welcome back
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">
                Sign in to your exclusive grooming lounge
            </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-gutter" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">Email address</label>
<div class="relative">
<input class="w-full bg-transparent border border-outline-variant rounded-xl px-4 py-3.5 text-on-background font-body-md text-body-md input-focus-gold transition-all duration-300 placeholder:text-outline-variant" id="email" placeholder="jameson@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">
                        mail
                    </span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border border-outline-variant rounded-xl px-4 py-3.5 text-on-background font-body-md text-body-md input-focus-gold transition-all duration-300 placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">
                        lock
                    </span>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="group relative w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-label-md text-label-md font-bold tracking-wider hover:opacity-90 active:scale-[0.98] transition-all duration-200 overflow-hidden">
<span class="relative z-10 uppercase">Sign In</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-60">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
</div>
<!-- Secondary Action -->
<button class="w-full border border-outline-variant text-on-background py-4 rounded-xl font-label-md text-label-md flex items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-[0.98] transition-transform duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</form>
<!-- Footer Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 transition-all ml-1" href="#">Create account</a>
</p>
</div>
</main>
<!-- Support Link Floating -->
<div class="fixed bottom-8 right-8 z-20">
<button class="flex items-center gap-2 text-outline-variant hover:text-primary transition-colors cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg">help_outline</span>
<span class="font-label-sm text-label-sm">Support</span>
</button>
</div>
<script>
        // Simple entrance animations
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-fade-in');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    el.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
</body></html>
