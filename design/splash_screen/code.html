<style>
        body {
            background-color: #141414;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling during splash */
            font-family: 'Manrope', sans-serif;
        }

        .splash-container {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #141414;
            position: relative;
        }

        /* Pure brand mark elegance - Fade in animation */
        .brand-logo-anim {
            opacity: 0;
            transform: scale(0.96);
            animation: eleganceFadeIn 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes eleganceFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
                filter: blur(4px);
            }
            30% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 1;
            }
        }

        /* Subtle atmospheric gradient in background */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(242, 202, 80, 0.05) 0%, rgba(20, 20, 20, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Material Symbols Styling */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="dark bg-background text-on-background">

<!-- Micro-interaction script -->
<script>
        // Inline logic for atmospheric pulse or redirection
        document.addEventListener('DOMContentLoaded', () => {
            const glow = document.querySelector('.ambient-glow');
            
            // Subtle mouse tracking for ambient glow if user moves mouse
            window.addEventListener('mousemove', (e) => {
                const x = e.clientX;
                const y = e.clientY;
                
                glow.style.left = `${x - 300}px`;
                glow.style.top = `${y - 300}px`;
                glow.style.transition = 'left 2s ease-out, top 2s ease-out';
            });

        });
    </script>
